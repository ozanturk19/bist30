{# SPEC-007 Fix (CPO MSG-114): Premium modal partial — sitewide paywall.
   index.html dışındaki sayfalar (tarama, sinyal_performans, hisse) bunu include eder.
   openPremiumModal + submitPremium + _hasPremiumAccess sitewide erişilebilir olur. #}
<style>
  .premium-modal-backdrop {
    display: none;
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.65);
    backdrop-filter: blur(4px);
    z-index: 9998;
    align-items: center;
    justify-content: center;
    padding: 20px;
    opacity: 0;
    transition: opacity .2s ease;
  }
  .premium-modal-backdrop.visible { opacity: 1; }
  .premium-modal {
    background: var(--bp-surface, #161b22);
    border: 1px solid rgba(255,200,80,.45);
    border-radius: 12px;
    padding: 28px 24px 20px;
    max-width: 380px;
    width: 100%;
    position: relative;
    box-shadow: 0 12px 40px rgba(0,0,0,0.6), 0 0 30px rgba(255,200,80,0.10);
    text-align: center;
  }
  .premium-modal-close {
    position: absolute;
    top: 10px; right: 14px;
    background: transparent;
    border: none;
    color: var(--bp-text3, #484f58);
    font-size: 22px;
    cursor: pointer;
    line-height: 1;
    padding: 4px 8px;
    border-radius: 4px;
  }
  .premium-modal-close:hover { color: var(--bp-text, #e6edf3); background: rgba(255,255,255,0.05); }
  .premium-modal-icon { font-size: 38px; margin-bottom: 8px; }
  .premium-modal-title {
    color: var(--bp-text, #e6edf3);
    font-size: 19px; font-weight: 700; margin: 0 0 8px;
  }
  .premium-modal-desc {
    color: var(--bp-text2, #8b949e);
    font-size: 13px; line-height: 1.55; margin: 0 0 18px;
  }
  .premium-modal-desc strong { color: #ffc850; }
  .premium-modal form { display: flex; flex-direction: column; gap: 10px; margin-bottom: 12px; }
  .premium-modal input[type=email],
  .premium-modal input[type=text] {
    width: 100%;
    background: rgba(28,33,40,.7);
    border: 1px solid var(--bp-border, #30363d);
    border-radius: 6px;
    padding: 10px 12px;
    color: var(--bp-text, #e6edf3);
    font-size: 14px; font-family: inherit;
    outline: none; transition: border-color .15s ease;
  }
  .premium-modal input:focus { border-color: #ffc850; }
  .premium-modal-submit {
    background: linear-gradient(135deg, #ffc850, #e3b341);
    color: #1a1a1f; border: none;
    padding: 11px 14px; border-radius: 6px;
    font-size: 14px; font-weight: 700; cursor: pointer;
    transition: transform .15s ease, box-shadow .15s ease;
  }
  .premium-modal-submit:hover:not(:disabled) {
    transform: translateY(-1px);
    box-shadow: 0 4px 14px rgba(255,200,80,.30);
  }
  .premium-modal-submit:disabled { opacity: .6; cursor: not-allowed; }
  .premium-modal-recognize {
    background: transparent;
    border: 1px solid rgba(255,200,80,.45);
    color: #ffc850;
    padding: 10px 14px; border-radius: 6px;
    font-size: 13px; font-weight: 600; cursor: pointer;
    font-family: inherit; transition: background .15s ease;
  }
  .premium-modal-recognize:hover { background: rgba(255,200,80,.08); }
  .premium-modal-status { font-size: 12px; min-height: 18px; margin: 4px 0 8px; }
  .premium-modal-footer {
    color: var(--bp-text3, #484f58);
    font-size: 11px; padding-top: 10px;
    border-top: 1px solid rgba(48,54,61,0.5);
  }
  @media (max-width: 480px) {
    .premium-modal { padding: 22px 18px 16px; }
    .premium-modal-title { font-size: 17px; }
  }
</style>
<script>
/* SPEC-007 sitewide premium modal — guard ile çift tanım önlenir (index.html kendi kopyasını taşır) */
if (typeof window.openPremiumModal !== 'function') {
  window._hasPremiumAccess = function() {
    try { return !!document.cookie.match(/(?:^|;\s*)bp_premium_trial=1/); }
    catch (_) { return false; }
  };

  window.closePremiumModal = function() {
    const modal = document.getElementById('premiumModal');
    if (!modal) return;
    modal.classList.remove('visible');
    setTimeout(() => { modal.style.display = 'none'; }, 200);
  };

  window.openPremiumModal = function() {
    let modal = document.getElementById('premiumModal');
    if (!modal) {
      modal = document.createElement('div');
      modal.id = 'premiumModal';
      modal.className = 'premium-modal-backdrop';
      modal.innerHTML = `
        <div class="premium-modal" role="dialog" aria-labelledby="pmTitle" aria-modal="true">
          <button class="premium-modal-close" onclick="closePremiumModal()" aria-label="Kapat">×</button>
          <div class="premium-modal-icon">⭐</div>
          <h3 id="pmTitle" class="premium-modal-title">Premium Sinyalleri Aç</h3>
          <p class="premium-modal-desc">
            Premium sinyaller <strong>ücretsiz</strong>. Sadece email'inle giriş yap, 30 gün boyunca tam erişim.
          </p>
          <form id="premiumModalForm" onsubmit="event.preventDefault();submitPremium();return false;">
            <input type="email" id="pmEmail" placeholder="E-posta adresin" required
                   autocomplete="email" autocapitalize="off" autocorrect="off">
            <input type="text" id="pmName" placeholder="Adın (opsiyonel)"
                   autocomplete="given-name" maxlength="50">
            <button type="submit" id="pmSubmitBtn" class="premium-modal-submit">💎 Premium'u Aç</button>
            <button type="button" class="premium-modal-recognize" onclick="submitPremiumRecognize()">👤 Üye Girişi (eski abone)</button>
          </form>
          <div id="pmStatus" class="premium-modal-status" aria-live="polite"></div>
          <div class="premium-modal-footer">
            <small>30 gün ücretsiz erişim · İstediğin zaman çık · Spam yok</small>
          </div>
        </div>`;
      document.body.appendChild(modal);
    }
    modal.style.display = 'flex';
    setTimeout(() => {
      modal.classList.add('visible');
      const e = document.getElementById('pmEmail');
      if (e) e.focus();
    }, 10);
  };

  window.submitPremium = async function() {
    const emailEl = document.getElementById('pmEmail');
    const nameEl  = document.getElementById('pmName');
    const btn     = document.getElementById('pmSubmitBtn');
    const status  = document.getElementById('pmStatus');
    const email   = (emailEl?.value || '').trim();
    const name    = (nameEl?.value || '').trim();
    if (!email || !email.includes('@')) {
      if (status) status.innerHTML = '<span style="color:#f85149">⚠️ Geçerli email gerekli.</span>';
      if (emailEl) { emailEl.style.borderColor = '#f85149'; emailEl.focus(); }
      return;
    }
    if (btn) { btn.disabled = true; btn.textContent = 'Kaydediliyor…'; }
    if (status) status.innerHTML = '<span style="color:#8b949e">⏳ Kayıt yapılıyor…</span>';
    try {
      const res = await fetch('/api/subscribe', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email, name, source: 'premium-trial' }),
      });
      const json = await res.json();
      if (json.ok) {
        const exp = new Date(Date.now() + 30 * 86400 * 1000).toUTCString();
        document.cookie = `bp_premium_trial=1; expires=${exp}; path=/; SameSite=Lax`;
        if (typeof window.bpRecordSubscribe === 'function' && json.token) {
          window.bpRecordSubscribe({ token: json.token, email: json.email || email, name: json.name || name });
        } else {
          try {
            localStorage.setItem('bp_sub_user', JSON.stringify({
              subscribed: true, email, name, first_name: (name||'').split(' ')[0],
              token: json.token || '', profile_done: false, cachedAt: Date.now(),
            }));
          } catch(_) {}
        }
        if (status) status.innerHTML = '<span style="color:#3fb950">✅ Premium aktif! Sayfa yenileniyor…</span>';
        setTimeout(() => { closePremiumModal(); location.reload(); }, 1200);
      } else {
        if (status) status.innerHTML = `<span style="color:#f85149">⚠️ ${json.message || json.error || 'Hata'}</span>`;
        if (btn) { btn.disabled = false; btn.textContent = '💎 Premium\'u Aç'; }
      }
    } catch (e) {
      if (status) status.innerHTML = '<span style="color:#f85149">⚠️ Bağlantı hatası, tekrar dene.</span>';
      if (btn) { btn.disabled = false; btn.textContent = '💎 Premium\'u Aç'; }
    }
  };

  /* MSG-118 Bug F: Premium modal "Üye Girişi" — eski abone re-recognize */
  window.submitPremiumRecognize = async function() {
    const emailEl = document.getElementById('pmEmail');
    const status  = document.getElementById('pmStatus');
    const email   = (emailEl?.value || '').trim();
    if (!email || !email.includes('@')) {
      if (status) status.innerHTML = '<span style="color:#f85149">⚠️ Geçerli email gerekli.</span>';
      if (emailEl) { emailEl.style.borderColor = '#f85149'; emailEl.focus(); }
      return;
    }
    if (status) status.innerHTML = '<span style="color:#8b949e">⏳ Kontrol ediliyor…</span>';
    try {
      const res  = await fetch('/api/recognize', {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email }),
      });
      const json = await res.json();
      if (res.ok && json.ok) {
        try {
          localStorage.setItem('bp_sub_user', JSON.stringify({
            subscribed: true, email, name: json.name || '',
            first_name: (json.name || '').split(' ')[0], cachedAt: Date.now(),
          }));
        } catch(_) {}
        if (status) status.innerHTML = '<span style="color:#3fb950">✅ Hoş geldin' + (json.name ? ' ' + json.name : '') + '! Premium açıldı, yenileniyor…</span>';
        setTimeout(() => location.reload(), 1500);
      } else if (res.status === 404) {
        if (status) status.innerHTML = '<span style="color:#e3b341">❓ Bu e-posta kayıtlı değil — "💎 Premium\'u Aç" ile kaydol.</span>';
      } else {
        if (status) status.innerHTML = '<span style="color:#f85149">⚠️ ' + (json.error || 'Hata') + '</span>';
      }
    } catch (e) {
      if (status) status.innerHTML = '<span style="color:#f85149">⚠️ Bağlantı hatası, tekrar dene.</span>';
    }
  };
}
</script>
