<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>BorsaPusula — Çevrimdışı</title>
  <meta name="theme-color" content="#0e0e12">
  <link rel="manifest" href="/static/manifest.json">
  <link rel="icon" type="image/svg+xml" href="/static/favicon.svg">
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    body{
      background:#0e0e12;
      color:#e2e8f0;
      font-family:'Segoe UI',system-ui,sans-serif;
      min-height:100dvh;
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      gap:1.5rem;
      padding:2rem;
      text-align:center;
    }
    .icon{font-size:3.5rem;line-height:1}
    h1{font-size:1.4rem;font-weight:700;letter-spacing:-.02em}
    p{font-size:.95rem;color:#94a3b8;max-width:320px;line-height:1.6}
    button{
      margin-top:.5rem;
      padding:.65rem 1.6rem;
      background:#3b82f6;
      color:#fff;
      border:none;
      border-radius:8px;
      font-size:.9rem;
      font-weight:600;
      cursor:pointer;
      transition:background .15s;
    }
    button:hover{background:#2563eb}
    .signal-note{
      font-size:.8rem;
      color:#475569;
      max-width:280px;
    }
  </style>
</head>
<body>
  <div class="icon">📡</div>
  <h1>İnternet bağlantısı yok</h1>
  <p>BorsaPusula'ya erişmek için internet bağlantısı gerekiyor. Bağlantı kurulunca sinyaller güncel olarak yüklenecek.</p>
  <button onclick="window.location.reload()">Tekrar Dene</button>
  <p class="signal-note">Bağlantı kurulduğunda otomatik olarak yönlendirileceksiniz.</p>
  <script>
    window.addEventListener('online', () => window.location.reload());
  </script>
</body>
</html>
