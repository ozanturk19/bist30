<style>
  :root {
    --bp-bg:#0b111f; --bp-surface:#111827; --bp-surface2:#1a2438;
    --bp-border:#1e2d45; --bp-border2:#2d4166;
    --bp-text:#e2e8f0; --bp-text2:#94a3b8; --bp-text3:#64748b;
    --bp-brand:#3b82f6; --bp-al:#3fb950; --bp-sat:#f85149;
    --bp-bkl:#8b949e; --bp-gold:#f59e0b; --bp-radius:10px;
    --accent:#1f6feb;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: var(--bp-bg); color: var(--bp-text);
    font-family: 'Inter', 'Segoe UI', system-ui, -apple-system, sans-serif;
    -webkit-font-smoothing: antialiased; font-size: 14px; min-height: 100vh;
  }
  header {
    background: var(--bp-surface); border-bottom: 1px solid var(--bp-border);
    padding: 14px 24px; display: flex; align-items: center; gap: 16px;
    position: sticky; top: 0; z-index: 100;
  }
  .back-btn {
    display: flex; align-items: center; gap: 6px; color: var(--bp-text2);
    font-size: 13px; text-decoration: none; padding: 5px 10px;
    border: 1px solid var(--bp-border); border-radius: 6px;
    background: var(--bp-surface2); transition: all 0.15s; white-space: nowrap;
  }
  .back-btn:hover { color: var(--bp-text); border-color: var(--bp-border2); }
  .page-title { font-size: 20px; font-weight: 700; }
  .page-sub   { font-size: 12px; color: var(--bp-text3); margin-top: 1px; }

  .container { max-width: 1100px; margin: 0 auto; padding: 24px; }

  /* ── Stats Row ── */
  .stats-row {
    display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px;
    margin-bottom: 28px;
  }
  .stat-card {
    background: var(--bp-surface); border: 1px solid var(--bp-border);
    border-radius: var(--bp-radius); padding: 18px 16px; text-align: center;
    transition: border-color .15s;
  }
  .stat-card:hover { border-color: var(--bp-border2); }
  .stat-num  { font-size: 36px; font-weight: 800; line-height: 1; }
  .stat-lbl  { font-size: 11px; color: var(--bp-text3); margin-top: 6px; text-transform: uppercase; letter-spacing: .5px; }
  .num-al  { color: var(--bp-al); }
  .num-sat { color: var(--bp-sat); }
  .num-bkl { color: var(--bp-bkl); }
  .num-tot { color: var(--bp-text); }

  /* ── Section ── */
  .section { margin-bottom: 28px; }
  .section-hdr {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 14px;
  }
  .section-title {
    font-size: 14px; font-weight: 700; color: var(--bp-text);
    display: flex; align-items: center; gap: 7px;
  }
  .section-title .dot {
    width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0;
  }
  .dot-al  { background: var(--bp-al); box-shadow: 0 0 6px rgba(63,185,80,.5); }
  .dot-str { background: var(--accent); box-shadow: 0 0 6px rgba(31,111,235,.5); }
  .section-sub { font-size: 11px; color: var(--bp-text3); }

  /* ── Stock Cards ── */
  .stock-grid {
    display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 10px;
  }
  .stock-card {
    background: var(--bp-surface); border: 1px solid var(--bp-border);
    border-radius: var(--bp-radius); padding: 14px 16px; text-decoration: none; color: inherit;
    display: block; transition: all .15s; position: relative; overflow: hidden;
  }
  .stock-card::before {
    content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 3px;
    background: var(--card-accent, var(--bp-bkl)); border-radius: 3px 0 0 3px;
  }
  .stock-card.al  { --card-accent: var(--bp-al); }
  .stock-card.sat { --card-accent: var(--bp-sat); }
  .stock-card:hover { border-color: var(--bp-border2); background: var(--bp-surface2); transform: translateY(-1px); }

  .sc-top { display: flex; align-items: flex-start; justify-content: space-between; gap: 8px; }
  .sc-ticker { font-size: 16px; font-weight: 800; font-family: monospace; }
  .sc-name   { font-size: 11px; color: var(--bp-text3); margin-top: 1px; }

  .badge {
    display: inline-flex; align-items: center; gap: 3px; padding: 3px 9px;
    border-radius: 20px; font-size: 10px; font-weight: 600; letter-spacing: .3px;
    text-transform: uppercase; white-space: nowrap;
  }
  .badge.al  { background: rgba(63,185,80,.12);  color:var(--bp-al);  border:1px solid rgba(63,185,80,.3); }
  .badge.sat { background: rgba(248,81,73,.12);  color:var(--bp-sat); border:1px solid rgba(248,81,73,.3); }
  .badge.bkl { background: rgba(139,148,158,.1); color:var(--bp-bkl); border:1px solid rgba(139,148,158,.2); }

  .sc-metrics {
    display: flex; gap: 12px; margin-top: 10px; flex-wrap: wrap;
  }
  .sc-metric { font-size: 11px; color: var(--bp-text3); }
  .sc-metric strong { color: var(--bp-text2); font-weight: 600; }
  .sc-metric.up-val strong { color: var(--bp-al); }
  .sc-metric.dn-val strong { color: var(--bp-sat); }

  .sc-footer {
    display: flex; align-items: center; justify-content: space-between; margin-top: 10px;
  }
  .sc-price { font-size: 14px; font-weight: 700; font-family: monospace; }
  .sc-chg   { font-size: 11px; font-weight: 600; }
  .sc-chg.up { color: var(--bp-al); }
  .sc-chg.dn { color: var(--bp-sat); }
  .sc-arrow  { font-size: 11px; color: var(--accent); font-weight: 600; }

  /* ── New signal highlight ── */
  .stock-card.new-signal {
    border-color: rgba(63,185,80,.4);
    background: rgba(63,185,80,.04);
  }
  .stock-card.new-signal.sat {
    border-color: rgba(248,81,73,.4);
    background: rgba(248,81,73,.04);
  }
  .new-badge {
    display: inline-block; font-size: 9px; font-weight: 700;
    background: rgba(63,185,80,.2); color: var(--bp-al); border-radius: 3px;
    padding: 1px 5px; text-transform: uppercase; letter-spacing: .5px; margin-left: 4px;
  }
  .sat .new-badge { background: rgba(248,81,73,.2); color: var(--bp-sat); }

  /* ── Empty state ── */
  .empty-box {
    background: var(--bp-surface); border: 1px solid var(--bp-border);
    border-radius: var(--bp-radius); padding: 28px; text-align: center;
    color: var(--bp-text3); font-size: 13px;
  }

  /* ── Skeleton ── */
  .skeleton {
    background: linear-gradient(90deg, #161b22 25%, #1e2530 50%, #161b22 75%);
    background-size: 200% 100%; animation: shimmer 1.4s infinite; border-radius: 4px;
  }
  @keyframes shimmer { 0%{background-position:-200% 0} 100%{background-position:200% 0} }
  .sk-card { height: 100px; border-radius: var(--bp-radius); }

  .updated-at { font-size: 11px; color: var(--bp-text3); margin-top: 20px; text-align: right; }

  /* ── Responsive ── */
  @media (max-width: 640px) {
    header { padding: 12px 16px; }
    .container { padding: 16px; }
    .stats-row { grid-template-columns: repeat(2, 1fr); }
    .stat-num  { font-size: 28px; }
    .stock-grid { grid-template-columns: 1fr; }
    .page-title { font-size: 16px; }
  }
  /* ── Makro Ticker Bandı ── */
  .macro-bar {
    background:#0b111f; border-bottom:1px solid #1e2d45;
    height:34px; overflow:hidden; position:relative; white-space:nowrap;
  }
  .macro-bar::before, .macro-bar::after {
    content:''; position:absolute; top:0; bottom:0; width:60px;
    pointer-events:none; z-index:2;
  }
  .macro-bar::before { left:0; background:linear-gradient(to right,#0b111f,transparent); }
  .macro-bar::after  { right:0; background:linear-gradient(to left,#0b111f,transparent); }
  .macro-track {
    display:inline-flex; align-items:center;
    animation:macroScroll 40s linear infinite; height:34px;
  }
  .macro-bar:hover .macro-track { animation-play-state:paused; }
  @keyframes macroScroll { from{transform:translateX(0);} to{transform:translateX(-50%);} }
  .macro-item {
    display:inline-flex; align-items:center; gap:8px;
    padding:0 20px; border-right:1px solid #1e2d45;
    font-size:12px; height:34px; text-decoration:none; color:inherit;
  }
  .macro-item-lbl { font-weight:600; color:#cbd5e1; }
  .mc-pos { color:#3fb950; } .mc-neg { color:#f85149; } .mc-neu { color:#8b949e; }
</style>

<script>
const QUALITY_LABELS = {'IDEAL':'İdeal','IYI':'İyi','DIKKATLI':'Dikkatli','UZAK':'Uzak'};

function adxFromStock(s) {
  const inds = s.indicators || {};
  const lbl  = (inds.adx || {}).label || '';
  try { return parseFloat(lbl.replace('ADX','').trim()) || null; }
  catch { return null; }
}

function renderCard(s, isNew) {
  const isAl  = s.signal === 'AL';
  const isSat = s.signal === 'SAT';
  const sigCls  = isAl ? 'al' : isSat ? 'sat' : 'bkl';
  const badgeTxt = isAl ? '▲ Güçlü Trend' : isSat ? '▼ Zayıf Trend' : '● Belirsiz';
  const adx  = adxFromStock(s);
  const chg  = parseFloat(s.change_pct || 0);
  const chgCls = chg >= 0 ? 'up' : 'dn';
  const chgTxt = (chg>=0?'+':'') + chg.toFixed(2) + '%';
  const priceStr = s.price ? parseFloat(s.price).toLocaleString('tr-TR',{minimumFractionDigits:2,maximumFractionDigits:2}) + ' ₺' : '';

  const metrics = [];
  if (adx != null)          metrics.push(`<div class="sc-metric"><span>ADX </span><strong>${adx.toFixed(1)}</strong></div>`);
  if (s.rsi != null)        metrics.push(`<div class="sc-metric"><span>RSI </span><strong>${parseFloat(s.rsi).toFixed(1)}</strong></div>`);
  if (s.signal_bars)        metrics.push(`<div class="sc-metric"><span>Süre </span><strong>${s.signal_bars}g</strong></div>`);
  if (s.entry_quality)      metrics.push(`<div class="sc-metric"><span>Kalite </span><strong>${QUALITY_LABELS[s.entry_quality]||s.entry_quality}</strong></div>`);
  if (s.rr_ratio)           metrics.push(`<div class="sc-metric"><span>R/R </span><strong>1:${parseFloat(s.rr_ratio).toFixed(1)}</strong></div>`);

  const newMark = isNew ? `<span class="new-badge">Bugün</span>` : '';

  return `<a href="/hisse/${s.ticker}" class="stock-card ${sigCls}${isNew?' new-signal':''}">
    <div class="sc-top">
      <div>
        <div class="sc-ticker">${s.ticker}${newMark}</div>
        <div class="sc-name">${(s.name||'').replace(' A.Ş.','').replace(' T.A.Ş.','')}</div>
      </div>
      <span class="badge ${sigCls}">${badgeTxt}</span>
    </div>
    ${metrics.length ? `<div class="sc-metrics">${metrics.join('')}</div>` : ''}
    <div class="sc-footer">
      <div style="display:flex;align-items:center;gap:8px">
        <span class="sc-price">${priceStr}</span>
        ${priceStr ? `<span class="sc-chg ${chgCls}">${chgTxt}</span>` : ''}
      </div>
      <span class="sc-arrow">Detay →</span>
    </div>
  </a>`;
}

async function loadGundem() {
  try {
    const [gundemRes, newsRes] = await Promise.all([
      fetch('/api/gundem'),
      fetch('/api/market-news'),
    ]);
    const d = await gundemRes.json();

    // Stats
    const sm = d.signal_summary || {};
    document.getElementById('statsRow').innerHTML = `
      <div class="stat-card"><div class="stat-num num-al">${sm.al||0}</div><div class="stat-lbl">Güçlü Trend</div></div>
      <div class="stat-card"><div class="stat-num num-sat">${sm.sat||0}</div><div class="stat-lbl">Zayıf Trend</div></div>
      <div class="stat-card"><div class="stat-num num-bkl">${sm.bekle||0}</div><div class="stat-lbl">Belirsiz</div></div>
      <div class="stat-card"><div class="stat-num num-tot">${sm.total||0}</div><div class="stat-lbl">Toplam Hisse</div></div>
    `;

    // Updated at
    if (d.updated_at) {
      document.getElementById('updatedAt').textContent = 'Güncellendi: ' + d.updated_at;
    }

    // New signals
    const newSigs = d.new_signals || [];
    document.getElementById('newSigCount').textContent = newSigs.length > 0 ? `${newSigs.length} hisse` : '';
    if (newSigs.length === 0) {
      document.getElementById('newSignalsGrid').innerHTML =
        '<div class="empty-box">Bugün henüz sinyal değişimi yok. Piyasa sinyalleri gün içinde güncellenir.</div>';
    } else {
      document.getElementById('newSignalsGrid').innerHTML = newSigs.map(s => renderCard(s, true)).join('');
    }

    // Strong AL
    const strong = d.strong_al || [];
    if (strong.length === 0) {
      document.getElementById('strongAlGrid').innerHTML =
        '<div class="empty-box">Güçlü trend verisi bekleniyor…</div>';
    } else {
      document.getElementById('strongAlGrid').innerHTML = strong.map(s => renderCard(s, false)).join('');
    }

    // Bilanço takvimi
    const bilPeriods = d.bilanco_upcoming || [];
    if (bilPeriods.length > 0) {
      const bilEl = document.getElementById('bilancoPeriods');
      const bandEl = document.getElementById('bilancoBand');
      if (bilEl && bandEl) {
        bandEl.style.display = '';
        bilEl.innerHTML = bilPeriods.map(p => {
          const isActive = p.status === 'active';
          const dotClr   = isActive ? '#f59e0b' : '#8b949e';
          const badgeBg  = isActive ? 'rgba(245,158,11,.12)' : 'rgba(139,148,158,.08)';
          const badgeBrd = isActive ? 'rgba(245,158,11,.3)' : 'rgba(139,148,158,.2)';
          return `<div style="flex:1;min-width:200px;background:#111827;border:1px solid ${badgeBrd};border-radius:8px;padding:12px 14px">
            <div style="display:flex;align-items:center;gap:6px;margin-bottom:4px">
              <span style="width:7px;height:7px;border-radius:50%;background:${dotClr};flex-shrink:0"></span>
              <span style="font-size:12px;font-weight:600;color:#e2e8f0">${p.label}</span>
              <span style="font-size:10px;padding:1px 7px;border-radius:10px;background:${badgeBg};border:1px solid ${badgeBrd};color:${dotClr};margin-left:auto">${isActive ? 'Aktif' : 'Yaklaşıyor'}</span>
            </div>
            <div style="font-size:11px;color:#94a3b8;margin-bottom:3px">${p.desc}</div>
            <div style="font-size:11px;color:${dotClr};font-weight:500">${p.days_label}</div>
          </div>`;
        }).join('');
      }
    }

    // Market news
    try {
      const newsData = await newsRes.json();
      const items = newsData.items || [];
      const newsEl = document.getElementById('newsGrid');
      const newsUpEl = document.getElementById('newsUpdatedAt');
      if (newsData.updated_at) newsUpEl.textContent = newsData.updated_at;
      if (!items.length) {
        newsEl.innerHTML = '<div class="empty-box">Haber verisi bekleniyor…</div>';
      } else {
        newsEl.innerHTML = items.map(item => {
          const isAl  = item.signal === 'AL';
          const isSat = item.signal === 'SAT';
          const sigCls = isAl ? '#3fb950' : isSat ? '#f85149' : '#8b949e';
          const sigTxt = isAl ? '▲ AL' : isSat ? '▼ SAT' : '● BEKLE';
          const snippet = (item.snippet||'').replace(/\*\*([^*]+)\*\*/g,'$1').replace(/^\*\s+/gm,'• ').replace(/^-\s+/gm,'• ').trim();
          const kapHref = item.kap_url ? `<a href="${item.kap_url}" target="_blank" rel="noopener" style="font-size:11px;color:#58a6ff;text-decoration:none;flex-shrink:0">KAP ↗</a>` : '';
          return `<a href="/hisse/${item.ticker}" style="display:block;text-decoration:none;background:#111827;border:1px solid #1e2d45;border-radius:8px;padding:12px 14px;transition:border-color .15s"
            onmouseover="this.style.borderColor='#2d4166'" onmouseout="this.style.borderColor='#1e2d45'">
            <div style="display:flex;align-items:center;gap:8px;margin-bottom:6px">
              <span style="font-size:13px;font-weight:700;color:#e2e8f0">${item.ticker}</span>
              <span style="font-size:11px;font-weight:600;color:${sigCls}">${sigTxt}</span>
              <span style="font-size:11px;color:#64748b;margin-left:auto">${item.name||''}</span>
              ${kapHref}
            </div>
            <div style="font-size:12px;color:#94a3b8;line-height:1.5">${snippet}</div>
          </a>`;
        }).join('');
      }
    } catch(ne) { /* market-news hata — sessiz */ }

  } catch(e) {
    console.error('loadGundem error:', e);
    ['newSignalsGrid','strongAlGrid'].forEach(id => {
      document.getElementById(id).innerHTML = '<div class="empty-box">Veri yüklenemedi. Sayfayı yenileyin.</div>';
    });
  }
}

async function loadEconCalendar() {
  const grid = document.getElementById('econCalGrid');
  if (!grid) return;
  try {
    const res = await fetch('/api/economic-calendar');
    const d   = await res.json();
    const events = [...(d.today || []), ...(d.upcoming || [])];
    const unique = [];
    const seen = new Set();
    events.forEach(e => { if (!seen.has(e.date)) { seen.add(e.date); unique.push(e); } });
    if (!unique.length) {
      grid.innerHTML = '<div class="empty-box">Yaklaşan önemli ekonomik olay bulunamadı.</div>';
      return;
    }
    const IMP = { HIGH: { lbl: 'Yüksek', cls: 'color:#f85149' }, MED: { lbl: 'Orta', cls: 'color:#f59e0b' }, LOW: { lbl: 'Düşük', cls: 'color:#8b949e' } };
    grid.innerHTML = unique.slice(0, 6).map(e => {
      const imp = IMP[e.importance] || IMP.MED;
      const du  = e.days_until;
      const duTxt = e.is_today ? '<strong style="color:#f59e0b">Bugün!</strong>'
                   : du === 1  ? '<span style="color:#f59e0b">Yarın</span>'
                   : `<span style="color:#94a3b8">${du} gün sonra</span>`;
      return `<div style="display:flex;align-items:center;gap:12px;background:#111827;border:1px solid ${e.is_today?'rgba(245,158,11,.3)':'#1e2d45'};border-radius:8px;padding:10px 14px">
        <span style="font-size:18px;flex-shrink:0">${e.icon||'📅'}</span>
        <div style="flex:1;min-width:0">
          <div style="font-size:13px;font-weight:600;color:#e2e8f0">${e.event}</div>
          <div style="font-size:11px;color:#64748b;margin-top:1px">${e.date_fmt} · <span ${imp.cls}>${imp.lbl} Öncelik</span> · ${e.source}</div>
        </div>
        <div style="font-size:12px;text-align:right;flex-shrink:0">${duTxt}</div>
      </div>`;
    }).join('');
  } catch(e) {
    document.getElementById('econCalGrid').innerHTML = '<div class="empty-box">Takvim yüklenemedi.</div>';
  }
}

async function loadMacroNewsSection() {
  const grid = document.getElementById('macroNewsGrid');
  const upEl = document.getElementById('macroNewsUpdatedAt');
  if (!grid) return;
  try {
    const res  = await fetch('/api/macro-news');
    const data = await res.json();
    if (upEl && data.updated_at) upEl.textContent = 'Güncellendi: ' + data.updated_at;
    const items = data.items || [];
    if (!items.length) {
      grid.innerHTML = '<div class="empty-box">Makro haber bekleniyor…</div>';
      return;
    }
    grid.innerHTML = items.slice(0, 8).map(item => {
      return `<a href="${item.url}" target="_blank" rel="noopener"
        style="display:flex;align-items:flex-start;gap:10px;text-decoration:none;background:#111827;border:1px solid #1e2d45;border-radius:8px;padding:10px 14px;transition:border-color .15s"
        onmouseover="this.style.borderColor='#2d4166'" onmouseout="this.style.borderColor='#1e2d45'">
        <span style="font-size:9px;font-weight:700;color:#8b949e;text-transform:uppercase;letter-spacing:.5px;background:rgba(139,148,158,.1);border:1px solid rgba(139,148,158,.15);border-radius:4px;padding:2px 6px;white-space:nowrap;flex-shrink:0;margin-top:2px">${item.source}</span>
        <span style="font-size:12.5px;color:#e2e8f0;line-height:1.4;font-weight:500;flex:1">${item.title}</span>
        <span style="font-size:10px;color:#64748b;white-space:nowrap;flex-shrink:0;margin-top:2px">${item.date_str||item.published||''}</span>
      </a>`;
    }).join('');
  } catch(e) {
    grid.innerHTML = '<div class="empty-box">Makro haberler yüklenemedi.</div>';
  }
}

async function loadMacroSummary() {
  try {
    const res  = await fetch('/api/macro-summary');
    const data = await res.json();
    const txt  = (data.summary || '').trim();
    if (!txt) return;
    const box  = document.getElementById('macroSummaryBox');
    const el   = document.getElementById('macroSummaryText');
    const tm   = document.getElementById('macroSummaryTime');
    if (el) el.textContent = txt;
    if (tm && data.generated_at) tm.textContent = 'Oluşturuldu: ' + data.generated_at;
    if (box) box.style.display = '';
  } catch(e) {}
}

loadGundem();
loadEconCalendar();
loadMacroNewsSection();
loadMacroSummary();
// 5 dakikada bir otomatik yenile
setInterval(loadGundem, 5 * 60 * 1000);
setInterval(loadMacroNewsSection, 30 * 60 * 1000);

/* ── Makro Ticker ── */
const MACRO_LABELS = {
  XU100:'XU100', XU030:'XU030', USDTRY:'USD/TRY', EURTRY:'EUR/TRY',
  BIST30:'BIST30', BTC:'BTC', ALTIN:'Altın', GUMUS:'Gümüş',
  SP500:'S&P500', NASDAQ:'NASDAQ'
};
const MACRO_DEC = { USDTRY:4, EURTRY:4, XU100:0, XU030:0, SP500:0, NASDAQ:0, BTC:0 };
async function loadMacroBar() {
  try {
    const r = await fetch('/api/macro');
    const d = await r.json();
    const items = d.items || [];
    if (!items.length) return;
    const html = items.map(it => {
      const lbl   = MACRO_LABELS[it.label] || it.label;
      const dec   = MACRO_DEC[it.label] ?? 2;
      const price = it.price.toLocaleString('tr-TR', {minimumFractionDigits:dec, maximumFractionDigits:dec});
      const chg   = it.change;
      const sign  = chg > 0 ? '+' : '';
      const cls   = chg > 0.05 ? 'mc-pos' : chg < -0.05 ? 'mc-neg' : 'mc-neu';
      const arrow = chg > 0.05 ? '▲' : chg < -0.05 ? '▼' : '●';
      return `<span class="macro-item"><span class="macro-item-lbl">${lbl}</span><span>${price}</span><span class="${cls}">${arrow} ${sign}${chg.toFixed(2)}%</span></span>`;
    }).join('');
    const mt = document.getElementById('macroTrack');
    if (mt) { mt.innerHTML = html + html; const w = mt.scrollWidth/2; if(w>50) mt.style.animationDuration=(w/50).toFixed(1)+'s'; }
  } catch(e) {}
}
loadMacroBar();
setInterval(loadMacroBar, 60000);
</script>
